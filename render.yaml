services:
  # ombre-brain 主服务：Docker 运行时（镜像里同时有 Python + Node，
  # read-along 共读后端由 src/web/reading_bridge.py 以子进程方式拉起，
  # 不单独建服务、共用本服务持久盘，零新增费用）。
  # 注意：Render 无法原地更换已有服务的运行时；若现有服务不是 Docker，
  # 需新建 Docker 服务并把 disk 数据迁过去（见 read-along/README.md）。
  - type: web
    name: ombre-brain
    env: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: starter
    envVars:
      - key: OMBRE_TRANSPORT
        value: streamable-http
      - key: OMBRE_EMBED_BACKEND
        value: api
      - key: OMBRE_EMBED_API_KEY
        sync: false          # Set in Render dashboard
      - key: OMBRE_EMBED_BASE_URL
        sync: false          # e.g. https://generativelanguage.googleapis.com/v1beta/openai/
      - key: OMBRE_EMBED_MODEL
        sync: false          # e.g. gemini-embedding-001
      - key: OMBRE_COMPRESS_API_KEY
        sync: false          # Set in Render dashboard (any OpenAI-compatible key)
      - key: OMBRE_COMPRESS_BASE_URL
        sync: false          # e.g. https://generativelanguage.googleapis.com/v1beta/openai/
      - key: OMBRE_COMPRESS_MODEL
        sync: false          # e.g. gemini-2.5-flash
      - key: OMBRE_VAULT_DIR
        value: /app/buckets  # 持久盘挂载点（Dockerfile 同名 ENV，这里显式声明保持一致）
      - key: BARK_KEY
        sync: false          # bark_push 工具用；Bark App 设备 key，在 Dashboard 填
      - key: SUPABASE_URL
        sync: false          # phone_activity_query 工具用
      - key: SUPABASE_SERVICE_KEY
        sync: false          # service_role key 权限大，只放 Dashboard，绝不进仓库
      # read-along（共读）内嵌子进程相关——全部可留空走默认：
      #   READING_WEB_TOKEN     不设则首启自动生成并持久化到盘（<盘>/read-along/.web-token）
      #   READING_INTERNAL_PORT 默认 18004（127.0.0.1 内部端口，不对外）
      #   READING_API_BASE      不设则自动指向内部环回地址（推荐留空）
      #   READING_PUSH_ENABLED / READING_PUSH_WEBHOOK 保持不设（DRY-RUN）
    disk:
      name: ombre-buckets
      mountPath: /app/buckets
      sizeGB: 5              # 记忆桶 + peek 截图 + read-along 书库（<盘>/read-along/）共用
